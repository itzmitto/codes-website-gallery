<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="profile">
      <div class="avatar">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=felix" alt="avatar" />
      </div>
      <h1 class="name">@username</h1>
      <p class="bio">Developer · Creator · Builder</p>
    </div>

    <ul class="links">

      <li class="link-item" data-color="#24292e">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="github.png" alt="GitHub" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/github.png'" />
          </span>
          <span class="label">GitHub</span>
          <span class="arrow">→</span>
        </a>
      </li>

      <li class="link-item" data-color="#ff0000">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="youtube.png" alt="YouTube" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png'" />
          </span>
          <span class="label">YouTube</span>
          <span class="arrow">→</span>
        </a>
      </li>

      <li class="link-item" data-color="#1da1f2">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="twitter.png" alt="Twitter" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/twitter.png'" />
          </span>
          <span class="label">Twitter / X</span>
          <span class="arrow">→</span>
        </a>
      </li>

      <li class="link-item" data-color="#0077b5">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="linkedin.png" alt="LinkedIn" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/linkedin.png'" />
          </span>
          <span class="label">LinkedIn</span>
          <span class="arrow">→</span>
        </a>
      </li>

      <li class="link-item" data-color="#e1306c">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="instagram.png" alt="Instagram" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png'" />
          </span>
          <span class="label">Instagram</span>
          <span class="arrow">→</span>
        </a>
      </li>

      <li class="link-item" data-color="#5865f2">
        <a href="#" target="_blank">
          <span class="icon">
            <img src="discord.png" alt="Discord" onerror="this.src='https://img.icons8.com/ios-filled/50/ffffff/discord-logo.png'" />
          </span>
          <span class="label">Discord</span>
          <span class="arrow">→</span>
        </a>
      </li>

    </ul>

    <p class="footer">© 2026 · Made with ♥</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
