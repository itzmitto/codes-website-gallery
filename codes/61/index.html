<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <main class="main">

        <div class="taskbar">

            <!-- Midden -->
            <div class="taskbar-center">

                <div class="taskbar-icon active">
                    <img src="assets/windows.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/search.png" alt="">
                </div>

                <div class="taskbar-icon"> 
                    <img src="assets/taskview.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/widgets.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/edge.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/explorer.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/store.png" alt="">
                </div>

                <div class="taskbar-icon">
                    <img src="assets/mail.png" alt="">
                </div>

            </div>

            <!-- Rechts -->
            <div class="taskbar-right">

                <i class="fa-solid fa-angle-up"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-volume-high"></i>
                <i class="fa-solid fa-battery-full"></i>

                <div class="time-date">
                    <span>12:39 PM</span>
                    <span>10/2/2021</span>
                </div>

            </div>

        </div>

    </main>

</body>
</html>
