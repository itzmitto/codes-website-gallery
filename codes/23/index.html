<!DOCTYPE html>   
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Floating Grid Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Modern Floating Grid Menu</h1>
    <p class="subtitle">DevFlash</p>

    <!-- Menu Button -->
    <div class="menu-btn" id="menuBtn">
      <span class="hamburger"></span>
    </div>

    <!-- Social Grid -->
    <div class="social-grid" id="socialGrid">
      <a href="#" class="icon"><img src="icons/github.png" alt="GitHub"></a>
      <a href="#" class="icon"><img src="icons/facebook.png" alt="Facebook"></a>
      <a href="#" class="icon"><img src="icons/youtube.png" alt="YouTube"></a>
      
      <a href="#" class="icon"><img src="icons/discord.png" alt="Discord"></a>
      <a href="#" class="icon"><img src="icons/plus.png" alt="Plus"></a>
      <a href="#" class="icon"><img src="icons/whatsapp.png" alt="WhatsApp"></a>
      
      <a href="#" class="icon"><img src="icons/reddit.png" alt="Reddit"></a>
      <a href="#" class="icon"><img src="icons/instagram.png" alt="Instagram"></a>
      <a href="#" class="icon"><img src="icons/twitter.png" alt="Twitter"></a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
