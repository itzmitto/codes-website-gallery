<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Text</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="main-text">Mijn naam is Andre</div>

        <div class="rotating-text">
            <div class="words">
                <div class="word">First word</div>
                <div class="word">Second word</div>
                <div class="word">Third word</div>
            </div>
        </div>
    </div>
</body>

</html>
