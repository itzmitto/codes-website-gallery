<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinDash &ndash; Nina Brink</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a2e05" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>
    </div>
    <span class="logo-text">Fin<span>Dash</span></span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Menu</div>
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Personen</div>
    
    <a href="lars.html" class="nav-item">
      <span class="person-dot" style="background:#22C55E"></span>
      Lars Kuiper
    </a>
    <a href="sara.html" class="nav-item">
      <span class="person-dot" style="background:#38BDF8"></span>
      Sara Assen
    </a>
    <a href="max.html" class="nav-item">
      <span class="person-dot" style="background:#F59E0B"></span>
      Max Velden
    </a>
    <a href="nina.html" class="nav-item active">
      <span class="person-dot" style="background:#F472B6"></span>
      Nina Brink
    </a>
  </div>

  <div class="sidebar-footer">
    <strong>Mei 2026</strong>
    4 personen actief
  </div>
</aside>

<main class="main">

  <div class="topbar">
    <div>
      <h1 class="page-title">Nina Brink</h1>
      <p class="page-subtitle">Data Analyst &mdash; Mei 2026</p>
    </div>
    <a href="index.html" style="text-decoration:none;">
      <span class="topbar-badge">
        &larr; Overzicht
      </span>
    </a>
  </div>

  <!-- Hero -->
  <div class="person-hero">
    <div class="hero-avatar av4">NB</div>
    <div class="hero-info">
      <div class="hero-name">Nina Brink</div>
      <div class="hero-role">Data Analyst</div>
    </div>
    <div class="hero-badge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Spaarquote 37.3%
    </div>
  </div>

  <!-- KPI strip -->
  <section class="kpi-strip" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.75rem;">
    <div class="kpi-card highlight">
      <div class="kpi-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      </div>
      <span class="kpi-label">Salaris</span>
      <span class="kpi-value">&euro; 3,200</span>
      <span class="kpi-sub">bruto maand</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/></svg>
      </div>
      <span class="kpi-label">Totaal uitgaven</span>
      <span class="kpi-value">&euro; 2,005</span>
      <span class="kpi-sub down">62.7% van salaris</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
      </div>
      <span class="kpi-label">Netto over</span>
      <span class="kpi-value">&euro; 1,195</span>
      <span class="kpi-sub up">+37.3% gespaard</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <span class="kpi-label">Grootste post</span>
      <span class="kpi-value">&euro; 800</span>
      <span class="kpi-sub">Huur</span>
    </div>
  </section>

  <!-- Charts row -->
  <div class="detail-chart-row">
    <div class="chart-card">
      <div class="chart-card-header">
        <span class="chart-title">Netto trend (6 maanden)</span>
        <div class="legend-row">
          <span class="leg-item"><span class="leg-dot" style="background:#A3E635"></span>Netto</span>
        </div>
      </div>
      <div style="position:relative;height:200px;">
        <canvas id="chartTrend" role="img" aria-label="Netto trend Nina Brink"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <span class="chart-title">Verdeling uitgaven</span>
      </div>
      <div class="legend-col" id="donutLegend"></div>
      <div style="position:relative;height:150px;">
        <canvas id="chartDonut" role="img" aria-label="Verdeling uitgaven Nina Brink"></canvas>
      </div>
    </div>
  </div>

  <!-- Expense table -->
  <div class="table-card">
    <div class="table-card-header">
      <h3>Uitgaven overzicht</h3>
      <span class="section-tag">Mei 2026</span>
    </div>
    <table class="expense-table">
      <thead>
        <tr>
          <th>Categorie</th>
          <th>Aandeel</th>
          <th>Bedrag</th>
        </tr>
      </thead>
      <tbody>
        
          <tr>
            <td><span class="cat-badge cat-huur">Huur</span></td>
            <td>
              <div class="pct-bar">
                <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:40%;background:#0F172A"></div></div>
                <span class="pct-val">40%</span>
              </div>
            </td>
            <td>&euro; 800</td>
          </tr>
          <tr>
            <td><span class="cat-badge cat-eten">Eten</span></td>
            <td>
              <div class="pct-bar">
                <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:15%;background:#A3E635"></div></div>
                <span class="pct-val">15%</span>
              </div>
            </td>
            <td>&euro; 310</td>
          </tr>
          <tr>
            <td><span class="cat-badge cat-abo">Abonnementen</span></td>
            <td>
              <div class="pct-bar">
                <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:4%;background:#38BDF8"></div></div>
                <span class="pct-val">4%</span>
              </div>
            </td>
            <td>&euro; 75</td>
          </tr>
          <tr>
            <td><span class="cat-badge cat-trans">Transport</span></td>
            <td>
              <div class="pct-bar">
                <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:24%;background:#F59E0B"></div></div>
                <span class="pct-val">24%</span>
              </div>
            </td>
            <td>&euro; 490</td>
          </tr>
          <tr>
            <td><span class="cat-badge cat-overig">Overig</span></td>
            <td>
              <div class="pct-bar">
                <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:16%;background:#94A3B8"></div></div>
                <span class="pct-val">16%</span>
              </div>
            </td>
            <td>&euro; 330</td>
          </tr>
        <tr style="border-top:2px solid var(--border);">
          <td style="font-weight:700;color:var(--text-primary);">Totaal</td>
          <td></td>
          <td style="font-weight:800;font-size:14px;">&euro; 2,005</td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script>
  const CATS = ['Huur', 'Eten', 'Abonnementen', 'Transport', 'Overig'];
  const CAT_COLS = ['#0F172A', '#A3E635', '#38BDF8', '#F59E0B', '#94A3B8'];
  const expData = [800, 310, 75, 490, 330];
  const trendData = [980, 1050, 1090, 1020, 1150, 1195];
  const MUTED = '#94A3B8';
  const GRID = 'rgba(15,23,42,0.06)';

  // Trend
  new Chart(document.getElementById('chartTrend'), {
    type:'line',
    data:{ labels:['Dec','Jan','Feb','Mrt','Apr','Mei'], datasets:[{ label:'Netto', data:trendData, borderColor:'#A3E635', backgroundColor:'rgba(163,230,53,0.1)', fill:true, tension:0.4, pointBackgroundColor:'#A3E635', pointRadius:4, pointHoverRadius:6, borderWidth:2.5 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx=>` €${ctx.parsed.y.toLocaleString('nl-NL')}` } } }, scales:{ x:{ ticks:{ color:MUTED, font:{ family:'Plus Jakarta Sans', size:12 } }, grid:{ color:GRID }, border:{ color:'transparent' } }, y:{ ticks:{ color:MUTED, font:{ family:'Plus Jakarta Sans', size:11 }, callback: v=>'€'+v.toLocaleString('nl-NL') }, grid:{ color:GRID }, border:{ color:'transparent' } } } }
  });

  // Donut
  const dl = document.getElementById('donutLegend');
  CATS.forEach((l,i) => {
    const s = document.createElement('span'); s.className='leg-item';
    s.innerHTML=`<span class="leg-dot" style="background:${CAT_COLS[i]}"></span>${l}<strong>€${expData[i].toLocaleString('nl-NL')}</strong>`;
    dl.appendChild(s);
  });

  new Chart(document.getElementById('chartDonut'), {
    type:'doughnut',
    data:{ labels:CATS, datasets:[{ data:expData, backgroundColor:CAT_COLS, borderWidth:2, borderColor:'#fff', hoverOffset:5 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx=>` ${ctx.label}: €${ctx.parsed.toLocaleString('nl-NL')}` } } } }
  });
<\/script>

</body>
</html>
