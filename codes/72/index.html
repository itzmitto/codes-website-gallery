<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinDash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --primary: #A3E635;
      --primary-hover: #84CC16;
      --primary-light: #D9F99D;
      --background: #F8FAFC;
      --surface: #FFFFFF;
      --surface-secondary: #F1F5F9;
      --text-primary: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #38BDF8;
      --shadow-color: rgba(15, 23, 42, 0.08);
      --sidebar-w: 248px;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--background);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      min-height: 100vh;
    }
    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border-light);
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 18px; height: 18px; }
    .logo-text { font-size: 17px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.4px; }
    .logo-text span { color: var(--primary-hover); }
    .sidebar-section { padding: 1.25rem 1rem 0.5rem; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
      padding: 0 0.5rem; margin-bottom: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: var(--radius-sm);
      color: var(--text-secondary); text-decoration: none;
      font-size: 14px; font-weight: 600;
      transition: background 0.12s, color 0.12s;
      margin-bottom: 2px; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.7; }
    .nav-item:hover { background: var(--surface-secondary); color: var(--text-primary); }
    .nav-item.active { background: var(--primary-light); color: #365314; font-weight: 700; }
    .nav-item.active svg { opacity: 1; }
    .person-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-light);
      font-size: 12px; color: var(--text-muted);
    }
    .sidebar-footer strong { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }
    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem 2.5rem; max-width: 1100px; }
    /* TOPBAR */
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 26px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.8px; line-height: 1.1; }
    .page-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
    .topbar-badge {
      background: var(--primary-light); color: #365314;
      font-size: 12px; font-weight: 700; padding: 6px 14px;
      border-radius: 20px; letter-spacing: 0.2px; cursor: pointer; border: none;
    }
    .topbar-badge:hover { background: var(--primary); }
    /* KPI STRIP */
    .kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 2rem; }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 1px 4px var(--shadow-color);
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .kpi-card:hover { box-shadow: 0 4px 16px var(--shadow-color); border-color: var(--primary); }
    .kpi-card.highlight { background: var(--primary); border-color: var(--primary); }
    .kpi-card.highlight .kpi-label,
    .kpi-card.highlight .kpi-value,
    .kpi-card.highlight .kpi-sub { color: #1a2e05; }
    .kpi-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--surface-secondary); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .kpi-card.highlight .kpi-icon { background: rgba(15,46,5,0.15); }
    .kpi-icon svg { width: 17px; height: 17px; color: var(--text-secondary); }
    .kpi-card.highlight .kpi-icon svg { color: #1a2e05; }
    .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
    .kpi-value { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; color: var(--text-primary); line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--text-muted); }
    .kpi-sub.up { color: var(--success); }
    .kpi-sub.down { color: var(--danger); }
    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2 { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .section-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
    /* PERSONS GRID */
    .persons-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 2rem; }
    .person-overview-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
      box-shadow: 0 1px 4px var(--shadow-color);
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 12px; cursor: pointer;
    }
    .person-overview-card:hover { box-shadow: 0 6px 20px var(--shadow-color); border-color: var(--primary); transform: translateY(-2px); }
    .poc-header { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; letter-spacing: 0.3px; }
    .av1 { background: #dcfce7; color: #166534; }
    .av2 { background: #dbeafe; color: #1d4ed8; }
    .av3 { background: #fef3c7; color: #92400e; }
    .av4 { background: #fce7f3; color: #9d174d; }
    .poc-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .poc-role { font-size: 12px; color: var(--text-secondary); }
    .poc-salary { display: flex; justify-content: space-between; align-items: center; }
    .poc-salary-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .poc-salary-value { font-size: 16px; font-weight: 800; color: var(--text-primary); }
    .spend-bar-wrap { height: 5px; background: var(--surface-secondary); border-radius: 3px; overflow: hidden; }
    .spend-bar { height: 100%; background: var(--primary); border-radius: 3px; }
    .poc-stats { display: flex; justify-content: space-between; }
    .poc-stat { text-align: center; }
    .poc-stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .poc-stat-value { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
    .poc-stat-value.green { color: var(--success); }
    /* CHARTS */
    .charts-row { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; margin-bottom: 2rem; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 1px 4px var(--shadow-color); }
    .chart-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
    .chart-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .legend-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); font-weight: 600; }
    .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .legend-col { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1rem; }
    .legend-col .leg-item { justify-content: space-between; }
    .legend-col .leg-item strong { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-left: auto; }
    .trend-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 1px 4px var(--shadow-color); margin-bottom: 2rem; }
    /* PERSON DETAIL */
    .person-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem 2rem; display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.75rem; box-shadow: 0 1px 4px var(--shadow-color); }
    .hero-avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0; }
    .hero-info { flex: 1; }
    .hero-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .hero-role { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
    .hero-badge { display: flex; align-items: center; gap: 6px; background: var(--primary-light); color: #365314; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 20px; }
    .detail-chart-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 1.75rem; }
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 1px 4px var(--shadow-color); margin-bottom: 1.75rem; }
    .table-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .table-card-header h3 { font-size: 15px; font-weight: 700; }
    .expense-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .expense-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); padding: 0 12px 10px; border-bottom: 1px solid var(--border); }
    .expense-table th:last-child { text-align: right; }
    .expense-table td { padding: 11px 12px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); vertical-align: middle; }
    .expense-table td:last-child { text-align: right; font-weight: 700; color: var(--text-primary); }
    .expense-table tr:last-child td { border-bottom: none; }
    .expense-table tr:hover td { background: var(--surface-secondary); }
    .cat-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .cat-huur  { background: #dbeafe; color: #1e40af; }
    .cat-eten  { background: #dcfce7; color: #15803d; }
    .cat-abo   { background: #fef3c7; color: #b45309; }
    .cat-trans { background: #f3e8ff; color: #7c3aed; }
    .cat-overig{ background: #f1f5f9; color: #475569; }
    .pct-bar { display: flex; align-items: center; gap: 8px; }
    .pct-bar-inner { flex: 1; height: 4px; background: var(--surface-secondary); border-radius: 2px; overflow: hidden; }
    .pct-bar-fill { height: 100%; border-radius: 2px; }
    .pct-val { font-size: 11px; color: var(--text-muted); font-weight: 600; min-width: 30px; text-align: right; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--background); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 1200px) {
      .kpi-strip { grid-template-columns: repeat(2,1fr); }
      .persons-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 1.5rem; }
      .charts-row, .detail-chart-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .persons-grid { grid-template-columns: 1fr; }
      .kpi-strip { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a2e05" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>
    </div>
    <span class="logo-text">Fin<span>Dash</span></span>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Menu</div>
    <button class="nav-item" onclick="navigate('index')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Personen</div>
    <button class="nav-item" onclick="navigate('lars')">
      <span class="person-dot" style="background:#22C55E"></span>Lars Kuiper
    </button>
    <button class="nav-item" onclick="navigate('sara')">
      <span class="person-dot" style="background:#38BDF8"></span>Sara Assen
    </button>
    <button class="nav-item" onclick="navigate('max')">
      <span class="person-dot" style="background:#F59E0B"></span>Max Velden
    </button>
    <button class="nav-item" onclick="navigate('nina')">
      <span class="person-dot" style="background:#F472B6"></span>Nina Brink
    </button>
  </div>
  <div class="sidebar-footer">
    <strong>Mei 2026</strong>
    4 personen actief
  </div>
</aside>

<main class="main" id="app"></main>

<script>
  // ── DATA ──────────────────────────────────────────────────────────
  const PERSONS = {
    lars: {
      id: 'lars', initials: 'LK', av: 'av1', color: '#22C55E',
      name: 'Lars Kuiper', role: 'Software Developer',
      salary: 4200, expenses: 2655, net: 1545, savePct: 36.8,
      expData: [1050,420,85,640,460],
      trend: [1300,1420,1380,1490,1510,1545],
      biggestCat: 'Huur', biggestAmt: 1050,
      expPcts: [40,16,3,24,17]
    },
    sara: {
      id: 'sara', initials: 'SA', av: 'av2', color: '#38BDF8',
      name: 'Sara Assen', role: 'UX Designer',
      salary: 3600, expenses: 2590, net: 1010, savePct: 28.1,
      expData: [950,380,110,720,430],
      trend: [890,920,980,950,1020,1010],
      biggestCat: 'Huur', biggestAmt: 950,
      expPcts: [37,15,4,28,17]
    },
    max: {
      id: 'max', initials: 'MV', av: 'av3', color: '#F59E0B',
      name: 'Max Velden', role: 'Product Manager',
      salary: 3800, expenses: 2390, net: 1410, savePct: 37.1,
      expData: [900,350,95,580,465],
      trend: [1200,1280,1310,1290,1380,1410],
      biggestCat: 'Huur', biggestAmt: 900,
      expPcts: [38,15,4,24,19]
    },
    nina: {
      id: 'nina', initials: 'NB', av: 'av4', color: '#F472B6',
      name: 'Nina Brink', role: 'Data Analyst',
      salary: 3200, expenses: 2005, net: 1195, savePct: 37.3,
      expData: [800,310,75,490,330],
      trend: [980,1050,1090,1020,1150,1195],
      biggestCat: 'Huur', biggestAmt: 800,
      expPcts: [40,15,4,24,16]
    }
  };

  const CATS     = ['Huur','Eten','Abonnementen','Transport','Overig'];
  const CAT_COLS = ['#0F172A','#A3E635','#38BDF8','#F59E0B','#94A3B8'];
  const CAT_CLS  = ['cat-huur','cat-eten','cat-abo','cat-trans','cat-overig'];
  const COLORS   = { green:'#A3E635', dark:'#0F172A', success:'#22C55E', muted:'#94A3B8', grid:'rgba(15,23,42,0.06)' };

  let activeCharts = [];

  function destroyCharts() {
    activeCharts.forEach(c => c.destroy());
    activeCharts = [];
  }

  function fmt(n) { return '€\u00a0' + n.toLocaleString('nl-NL'); }

  // ── NAVIGATION ───────────────────────────────────────────────────
  function navigate(page) {
    destroyCharts();
    // update sidebar active state
    document.querySelectorAll('.sidebar .nav-item').forEach(el => el.classList.remove('active'));
    const btns = document.querySelectorAll('.sidebar .nav-item');
    const pageMap = { index:0, lars:1, sara:2, max:3, nina:4 };
    btns[pageMap[page]]?.classList.add('active');

    if (page === 'index') renderIndex();
    else renderPerson(PERSONS[page]);
    window.scrollTo(0,0);
  }

  // ── INDEX PAGE ───────────────────────────────────────────────────
  function renderIndex() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="topbar">
        <div>
          <h1 class="page-title">Financieel Overzicht</h1>
          <p class="page-subtitle">Alle 4 personen &mdash; Mei 2026</p>
        </div>
        <span class="topbar-badge">Mei 2026</span>
      </div>

      <section class="kpi-strip">
        <div class="kpi-card highlight">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
          <span class="kpi-label">Totaal salaris</span>
          <span class="kpi-value">&euro; 14.800</span>
          <span class="kpi-sub">4 personen gecombineerd</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/></svg></div>
          <span class="kpi-label">Totaal uitgaven</span>
          <span class="kpi-value">&euro; 9.640</span>
          <span class="kpi-sub down">65.1% van salaris</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div>
          <span class="kpi-label">Netto over</span>
          <span class="kpi-value">&euro; 5.160</span>
          <span class="kpi-sub up">34.9% spaarquote</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>
          <span class="kpi-label">Gem. per persoon</span>
          <span class="kpi-value">&euro; 1.290</span>
          <span class="kpi-sub">netto beschikbaar</span>
        </div>
      </section>

      <div class="section-header">
        <h2>Personen</h2>
        <span class="section-tag">Klik voor detail</span>
      </div>

      <section class="persons-grid">
        ${Object.values(PERSONS).map(p => `
          <div class="person-overview-card" onclick="navigate('${p.id}')">
            <div class="poc-header">
              <div class="avatar ${p.av}">${p.initials}</div>
              <div>
                <div class="poc-name">${p.name}</div>
                <div class="poc-role">${p.role}</div>
              </div>
            </div>
            <div class="poc-salary">
              <span class="poc-salary-label">Salaris</span>
              <span class="poc-salary-value">&euro; ${p.salary.toLocaleString('nl-NL')}</span>
            </div>
            <div class="spend-bar-wrap">
              <div class="spend-bar" style="width:${Math.round(p.expenses/p.salary*100)}%"></div>
            </div>
            <div class="poc-stats">
              <div class="poc-stat">
                <div class="poc-stat-label">Uitgaven</div>
                <div class="poc-stat-value">&euro; ${p.expenses.toLocaleString('nl-NL')}</div>
              </div>
              <div class="poc-stat">
                <div class="poc-stat-label">Netto</div>
                <div class="poc-stat-value green">+&euro; ${p.net.toLocaleString('nl-NL')}</div>
              </div>
              <div class="poc-stat">
                <div class="poc-stat-label">Spaar %</div>
                <div class="poc-stat-value">${p.savePct}%</div>
              </div>
            </div>
          </div>
        `).join('')}
      </section>

      <div class="section-header">
        <h2>Analyse</h2>
        <span class="section-tag">Vergelijking</span>
      </div>

      <section class="charts-row">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-title">Salaris vs Uitgaven per persoon</span>
            <div class="legend-row">
              <span class="leg-item"><span class="leg-dot" style="background:#A3E635"></span>Salaris</span>
              <span class="leg-item"><span class="leg-dot" style="background:#0F172A"></span>Uitgaven</span>
              <span class="leg-item"><span class="leg-dot" style="background:#22C55E"></span>Netto</span>
            </div>
          </div>
          <div style="position:relative;height:260px;">
            <canvas id="chartMain"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-title">Uitgaven totaal</span>
          </div>
          <div class="legend-col" id="donutLegend"></div>
          <div style="position:relative;height:180px;">
            <canvas id="chartDonut"></canvas>
          </div>
        </div>
      </section>

      <div class="section-header" style="margin-top:2rem;">
        <h2>Netto trend</h2>
        <span class="section-tag">6 maanden</span>
      </div>
      <div class="trend-card">
        <div class="chart-card-header">
          <span class="chart-title">Gecombineerd netto overschot per maand</span>
          <div class="legend-row"><span class="leg-item"><span class="leg-dot" style="background:#A3E635"></span>Netto</span></div>
        </div>
        <div style="position:relative;height:160px;">
          <canvas id="chartTrend"></canvas>
        </div>
      </div>
    `;

    // Bar chart
    activeCharts.push(new Chart(document.getElementById('chartMain'), {
      type:'bar',
      data:{
        labels:['Lars','Sara','Max','Nina'],
        datasets:[
          { label:'Salaris',  data:[4200,3600,3800,3200], backgroundColor:COLORS.green,   borderRadius:5, borderSkipped:false },
          { label:'Uitgaven', data:[2655,2590,2390,2005], backgroundColor:COLORS.dark,    borderRadius:5, borderSkipped:false },
          { label:'Netto',    data:[1545,1010,1410,1195], backgroundColor:COLORS.success, borderRadius:5, borderSkipped:false }
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
        scales:{ x:{ ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:12, weight:'600' } }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } },
                 y:{ ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:11 }, callback:v=>'€'+v.toLocaleString('nl-NL') }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } } } }
    }));

    // Donut
    const totals = [
      [1050,950,900,800],[420,380,350,310],[85,110,95,75],[640,720,580,490],[460,430,465,330]
    ].map(a=>a.reduce((s,v)=>s+v,0));

    const dl = document.getElementById('donutLegend');
    CATS.forEach((l,i) => {
      const s = document.createElement('span'); s.className='leg-item';
      s.innerHTML=`<span class="leg-dot" style="background:${CAT_COLS[i]}"></span>${l}<strong>€${totals[i].toLocaleString('nl-NL')}</strong>`;
      dl.appendChild(s);
    });

    activeCharts.push(new Chart(document.getElementById('chartDonut'),{
      type:'doughnut',
      data:{ labels:CATS, datasets:[{ data:totals, backgroundColor:CAT_COLS, borderWidth:2, borderColor:'#fff', hoverOffset:5 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx=>` ${ctx.label}: €${ctx.parsed.toLocaleString('nl-NL')}` } } } }
    }));

    // Trend
    activeCharts.push(new Chart(document.getElementById('chartTrend'),{
      type:'line',
      data:{ labels:['Dec','Jan','Feb','Mrt','Apr','Mei'],
        datasets:[{ label:'Netto', data:[4800,4950,5020,4780,5100,5160], borderColor:COLORS.green, backgroundColor:'rgba(163,230,53,0.1)', fill:true, tension:0.4, pointBackgroundColor:COLORS.green, pointRadius:4, pointHoverRadius:6, borderWidth:2.5 }] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx=>` €${ctx.parsed.y.toLocaleString('nl-NL')}` } } },
        scales:{ x:{ ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:12 } }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } },
                 y:{ min:4500, ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:11 }, callback:v=>'€'+v.toLocaleString('nl-NL') }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } } } }
    }));
  }

  // ── PERSON PAGE ──────────────────────────────────────────────────
  function renderPerson(p) {
    const app = document.getElementById('app');
    const spendPct = Math.round(p.expenses/p.salary*100);

    app.innerHTML = `
      <div class="topbar">
        <div>
          <h1 class="page-title">${p.name}</h1>
          <p class="page-subtitle">${p.role} &mdash; Mei 2026</p>
        </div>
        <button class="topbar-badge" onclick="navigate('index')">&larr; Overzicht</button>
      </div>

      <div class="person-hero">
        <div class="hero-avatar ${p.av}">${p.initials}</div>
        <div class="hero-info">
          <div class="hero-name">${p.name}</div>
          <div class="hero-role">${p.role}</div>
        </div>
        <div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          Spaarquote ${p.savePct}%
        </div>
      </div>

      <section class="kpi-strip" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.75rem;">
        <div class="kpi-card highlight">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
          <span class="kpi-label">Salaris</span>
          <span class="kpi-value">&euro; ${p.salary.toLocaleString('nl-NL')}</span>
          <span class="kpi-sub">bruto maand</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/></svg></div>
          <span class="kpi-label">Totaal uitgaven</span>
          <span class="kpi-value">&euro; ${p.expenses.toLocaleString('nl-NL')}</span>
          <span class="kpi-sub down">${spendPct}% van salaris</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div>
          <span class="kpi-label">Netto over</span>
          <span class="kpi-value">&euro; ${p.net.toLocaleString('nl-NL')}</span>
          <span class="kpi-sub up">+${p.savePct}% gespaard</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <span class="kpi-label">Grootste post</span>
          <span class="kpi-value">&euro; ${p.biggestAmt.toLocaleString('nl-NL')}</span>
          <span class="kpi-sub">${p.biggestCat}</span>
        </div>
      </section>

      <div class="detail-chart-row">
        <div class="chart-card">
          <div class="chart-card-header">
            <span class="chart-title">Netto trend (6 maanden)</span>
            <div class="legend-row"><span class="leg-item"><span class="leg-dot" style="background:#A3E635"></span>Netto</span></div>
          </div>
          <div style="position:relative;height:200px;"><canvas id="chartTrend"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-card-header"><span class="chart-title">Verdeling uitgaven</span></div>
          <div class="legend-col" id="donutLegend"></div>
          <div style="position:relative;height:150px;"><canvas id="chartDonut"></canvas></div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-card-header">
          <h3>Uitgaven overzicht</h3>
          <span class="section-tag">Mei 2026</span>
        </div>
        <table class="expense-table">
          <thead><tr><th>Categorie</th><th>Aandeel</th><th>Bedrag</th></tr></thead>
          <tbody>
            ${CATS.map((cat,i) => `
              <tr>
                <td><span class="cat-badge ${CAT_CLS[i]}">${cat}</span></td>
                <td>
                  <div class="pct-bar">
                    <div class="pct-bar-inner"><div class="pct-bar-fill" style="width:${p.expPcts[i]}%;background:${CAT_COLS[i]}"></div></div>
                    <span class="pct-val">${p.expPcts[i]}%</span>
                  </div>
                </td>
                <td>&euro; ${p.expData[i].toLocaleString('nl-NL')}</td>
              </tr>
            `).join('')}
            <tr style="border-top:2px solid var(--border);">
              <td style="font-weight:700;color:var(--text-primary);">Totaal</td>
              <td></td>
              <td style="font-weight:800;font-size:14px;">&euro; ${p.expenses.toLocaleString('nl-NL')}</td>
            </tr>
          </tbody>
        </table>
      </div>
    `;

    // Trend chart
    activeCharts.push(new Chart(document.getElementById('chartTrend'),{
      type:'line',
      data:{ labels:['Dec','Jan','Feb','Mrt','Apr','Mei'], datasets:[{ label:'Netto', data:p.trend, borderColor:'#A3E635', backgroundColor:'rgba(163,230,53,0.1)', fill:true, tension:0.4, pointBackgroundColor:'#A3E635', pointRadius:4, pointHoverRadius:6, borderWidth:2.5 }] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx=>` €${ctx.parsed.y.toLocaleString('nl-NL')}` } } },
        scales:{ x:{ ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:12 } }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } },
                 y:{ ticks:{ color:COLORS.muted, font:{ family:'Plus Jakarta Sans', size:11 }, callback:v=>'€'+v.toLocaleString('nl-NL') }, grid:{ color:COLORS.grid }, border:{ color:'transparent' } } } }
    }));

    // Donut legend
    const dl = document.getElementById('donutLegend');
    CATS.forEach((l,i) => {
      const s = document.createElement('span'); s.className='leg-item';
      s.innerHTML=`<span class="leg-dot" style="background:${CAT_COLS[i]}"></span>${l}<strong>€${p.expData[i].toLocaleString('nl-NL')}</strong>`;
      dl.appendChild(s);
    });

    activeCharts.push(new Chart(document.getElementById('chartDonut'),{
      type:'doughnut',
      data:{ labels:CATS, datasets:[{ data:p.expData, backgroundColor:CAT_COLS, borderWidth:2, borderColor:'#fff', hoverOffset:5 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx=>` ${ctx.label}: €${ctx.parsed.toLocaleString('nl-NL')}` } } } }
    }));
  }

  // ── BOOT ─────────────────────────────────────────────────────────
  navigate('index');
</script>
</body>
</html>
