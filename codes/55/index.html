<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Timer</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.timer{
    font-size:60px;
    margin:20px 0;
    font-weight:bold;
}

.buttons button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>💻 Study Mode</h1>
        <p class="subtitle">2 Uur Focus Timer</p>

        <div class="timer" id="timer">02:00:00</div>

        <div class="buttons">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pauze</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

    </div>
</div>

<script>
let totalTime = 7200;
let timer;
let running = false;

function updateTimer() {
    let hours = Math.floor(totalTime / 3600);
    let minutes = Math.floor((totalTime % 3600) / 60);
    let seconds = totalTime % 60;

    document.getElementById("timer").innerText =
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');

    if (totalTime <= 0) {
        clearInterval(timer);
        running = false;
        alert("🔥 Tijd om te knallen! Je 2 uur zit erop.");
        return;
    }

    totalTime--;
}

function startTimer() {
    if (!running) {
        running = true;
        timer = setInterval(updateTimer, 1000);
    }
}

function pauseTimer() {
    clearInterval(timer);
    running = false;
}

function resetTimer() {
    clearInterval(timer);
    running = false;
    totalTime = 7200;
    document.getElementById("timer").innerText = "02:00:00";
}
</script>

</body>
</html>
