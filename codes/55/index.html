<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>💻 Study Mode</h1>
            <p class="subtitle">2 Uur Focus Timer</p>
            <div class="timer" id="timer">02:00:00</div>
            <div class="buttons">
                <button onclick="startTimer()">Start</button>
                <button onclick="pauseTimer()">Pauze</button>
                <button onclick="resetTimer()">Reset</button>
        </div>
    </div>
    <script>
        let totalTime = 7200;
        let timer;
        let running = false;

        function updateTimer() {
            let hours = Math.floor(totalTime / 3600);
            let minutes = Math.floor((totalTime % 3600) / 60);
            let seconds = totalTime % 60;
            document.getElementById("timer").innerText =
                String(hours).padStart(2, '0') + ":" +
                String(minutes).padStart(2, '0') + ":" +
                String(seconds).padStart(2, '0');
            if (totalTime <= 0) {
                clearInterval(timer);
                running = false;
                alert("🔥 Tijd om te knallen! Je 2 uur zit erop.");
            }
            totalTime--;
        }
        function startTimer() {
            if (!running) {
                running = true;
                timer = setInterval(updateTimer, 1000);
            }
        }
        function pauseTimer() {
            clearInterval(timer);
            running = false;
        }
        function resetTimer() {
            clearInterval(timer);
            running = false;
            totalTime = 7200;
            document.getElementById("timer").innerText = "02:00:00";
        }
    </script>
</body>
</html>
